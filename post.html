<!DOCTYPE html>
<html>
<head>
  <title>Add Item</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f6fa;
      font-family: 'Segoe UI', sans-serif;
    }

    /* TOP BAR */

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .brand {
      font-weight: bold;
      font-size: 20px;
    }

    /* FORM */

    .container-box {
      width: 90%;
      max-width: 420px;
      margin: auto;
      margin-top: 50px;
      text-align: center;
    }

    h2 {
      margin-bottom: 25px;
      font-weight: 600;
    }

    .form-control, .form-select {
      margin-bottom: 12px;
      border-radius: 8px;
      padding: 10px;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(45deg, #6a5acd, #7b68ee);
      color: white;
      font-weight: 500;
      transition: 0.3s;
    }

    .submit-btn:hover {
      transform: scale(1.03);
    }

    #preview {
      width: 100%;
      max-height: 250px;
      object-fit: cover;
      display: none;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .remove-btn {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    /* MOBILE FIX */
    @media(max-width:576px){

      .top-bar {
        padding: 15px;
        text-align: center;
      }

    }

  </style>
</head>

<body>

<!-- TOP -->
<div class="top-bar">
  <div class="brand">Campus Lost & Found</div>
</div>

<!-- FORM -->

<div class="container-box">

  <h2>📦 Add Item</h2>

  <form onsubmit="addItem(event)">

    <input id="name" class="form-control" placeholder="Item Name" required>
    <input id="desc" class="form-control" placeholder="Description" required>
    <input id="location" class="form-control" placeholder="Location" required>

    <!-- IMAGE -->
    <input type="file" id="image" class="form-control" onchange="previewImage()">

    <img id="preview">

    <button type="button" class="btn btn-danger remove-btn" onclick="clearImage()">
      Remove Image
    </button>

    <select id="type" class="form-select">
      <option>Lost</option>
      <option>Found</option>
    </select>

    <button type="submit" class="submit-btn">Submit Item</button>

  </form>

</div>

<script>

// PREVIEW IMAGE

function previewImage(){
  let file = document.getElementById("image").files[0];
  let preview = document.getElementById("preview");

  if(file){
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
}

// CLEAR IMAGE
function clearImage(){
  document.getElementById("image").value = "";
  document.getElementById("preview").style.display = "none";
}

// SUBMIT

async function addItem(e){
  e.preventDefault();

  let userData = localStorage.getItem("user");

  if(!userData){
    alert("User not logged in ❌");
    return;
  }

  let user = JSON.parse(userData);

  let formData = new FormData();

  formData.append("name", document.getElementById("name").value);
  formData.append("desc", document.getElementById("desc").value);
  formData.append("location", document.getElementById("location").value);
  formData.append("type", document.getElementById("type").value);
  formData.append("owner", JSON.stringify(user));

  let file = document.getElementById("image").files[0];
  if(file){
    formData.append("image", file);
  }

  try{

    let res = await fetch("http://localhost:3000/add-item", {
      method: "POST",
      body: formData
    });

    let data = await res.json();

    if(data.success){
      window.location.assign("dashboard.html");
    } else {
      alert("Failed ❌");
    }

  } catch(err){
    console.error(err);
    alert("Server error ❌");
  }
}

</script>

</body>
</html>
