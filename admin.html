<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
      font-family: 'Segoe UI', sans-serif;
    }

    /* SIDEBAR */

    .sidebar {
      width: 220px;
      height: 100vh;
      position: fixed;
      background: #111827;
      color: white;
      padding: 20px;
    }

    .sidebar h4 {
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      color: #cbd5e1;
      text-decoration: none;
      margin-bottom: 15px;
      padding: 8px;
      border-radius: 6px;
    }

    .sidebar a:hover {
      background: #1f2937;
      color: white;
    }

    /* MAIN */

    .main {
      margin-left: 240px;
      padding: 20px;
    }

    .card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      transition: 0.3s;
      height: 100%;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .delete-btn {
      width: 100%;
      border-radius: 8px;
    }

    /* MOBILE FIX */


    @media(max-width:768px){

      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
      }

      .main {
        margin-left: 0;
      }

    }

    /* Mobile buttons full width */

    @media(max-width:576px){
      .btn {
        width: 100%;
      }
    }

  </style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">
  <h4>⚙ Admin</h4>

  <a href="#">📦 Manage Items</a>
  <a href="users.html">👤 Users</a>
  <a href="#" onclick="logout()">🚪 Logout</a>
</div>

<!-- MAIN -->

<div class="main">

  <div class="topbar d-flex justify-content-between mb-3 flex-wrap">
    <h3>Manage Items</h3>
  </div>

  <!-- RESPONSIVE GRID -->

  <div id="items" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3"></div>

</div>

<script>

// check admin

if(!localStorage.getItem("admin")){
  window.location.href = "login.html";
}

// load items

async function loadItems(){

  let res = await fetch("http://localhost:3000/items");
  let items = await res.json();

  let html = "";

  items.forEach(i => {

    html += `
    <div class="col">
      <div class="card p-3">

        ${i.image ? `
          <img src="${i.image}" 
          style="width:100%; height:200px; object-fit:cover; border-radius:10px; margin-bottom:10px;">
        ` : ""}

        <h5>${i.name || "No Name"}</h5>
        <p class="text-muted">${i.desc || "No Description"}</p>

        <b>${i.location || "No Location"}</b><br>

        <span class="badge bg-${i.type=="Lost"?"danger":"success"} mb-2">
          ${i.type}
        </span>

        <button class="btn btn-danger delete-btn mt-2"
          onclick="deleteItem('${i._id}')">
          Delete Item
        </button>

      </div>
    </div>
    `;
  });

  document.getElementById("items").innerHTML = html;
}

loadItems();


// DELETE

async function deleteItem(id){

  if(!confirm("Delete this item?")) return;

  await fetch("http://localhost:3000/delete-item", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ id })
  });

  alert("Item Deleted ✅");
  loadItems();
}


// LOGOUT


function logout(){
  localStorage.removeItem("admin");
  window.location.href = "login.html";
}

</script>

</body>
</html>
