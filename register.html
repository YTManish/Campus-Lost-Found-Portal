<!DOCTYPE html>
<html>
<head>
  <title>Register</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f6fa;
      font-family: 'Segoe UI', sans-serif;
    }

    /* TOP BAR */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .brand {
      font-weight: bold;
      font-size: 20px;
    }

    .login-btn {
      background: linear-gradient(45deg,#6a5acd,#7b68ee);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
    }

    /* FORM */
    .container-box {
      width: 90%;
      max-width: 400px;
      margin: auto;
      margin-top: 60px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      font-weight: 600;
    }

    .form-control {
      margin-bottom: 12px;
      border-radius: 8px;
      padding: 10px;
    }

    .register-btn-main {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(45deg,#6a5acd,#7b68ee);
      color: white;
      font-weight: 500;
    }

    .bottom-text {
      margin-top: 10px;
      font-size: 14px;
    }

    /* 🔥 MOBILE FIX */
    @media(max-width:576px){

      .top-bar {
        padding: 15px;
        text-align: center;
      }

      .login-btn {
        width: 100%;
      }

    }

  </style>
</head>

<body>

<!-- TOP -->
<div class="top-bar">
  <div class="brand">Campus Lost & Found</div>
  <button class="login-btn" onclick="window.location.href='login.html'">
    Login
  </button>
</div>

<!-- FORM -->
<div class="container-box">

  <h2>Student Registration</h2>

  <input id="name" class="form-control" placeholder="Full Name">
  <input id="contact" class="form-control" placeholder="Contact Number">
  <input id="department" class="form-control" placeholder="Department">
  <input id="username" class="form-control" placeholder="Username">
  <input id="password" type="password" class="form-control" placeholder="Password">

  <button class="register-btn-main" onclick="register()">Create Account</button>

  <div class="bottom-text">
    Already have an account? <a href="login.html">Login</a>
  </div>

</div>

<script>

async function register(){

  let user = {
    name: name.value,
    contact: contact.value,
    department: department.value,
    username: username.value,
    password: password.value
  };

  let res = await fetch("http://localhost:3000/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(user)
  });

  let data = await res.json();

  if(data.success){
    alert("Registered Successfully ✅");
    window.location.href = "login.html";
  } else {
    alert("Error ❌");
  }
}

</script>

</body>
</html>
