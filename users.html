<!DOCTYPE html>
<html>
<head>
  <title>Manage Users</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
      font-family: 'Segoe UI', sans-serif;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      height: 100vh;
      position: fixed;
      background: #111827;
      color: white;
      padding: 20px;
    }

    .sidebar a {
      display: block;
      color: #cbd5e1;
      margin-bottom: 15px;
      text-decoration: none;
      padding: 8px;
      border-radius: 6px;
    }

    .sidebar a:hover {
      background: #1f2937;
      color: white;
    }

    /* MAIN */
    .main {
      margin-left: 240px;
      padding: 20px;
    }

    .card {
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      height: 100%;
    }

    /* 🔥 MOBILE FIX */
    @media(max-width:768px){

      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
      }

      .main {
        margin-left: 0;
      }

    }

    /* Buttons full width on mobile */
    @media(max-width:576px){
      .btn {
        width: 100%;
      }
    }

  </style>
  
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h4>⚙ Admin</h4>

  <a href="admin.html">📦 Manage Items</a>
  <a href="users.html">👤 Users</a>
  <a href="#" onclick="logout()">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <h3>Manage Users</h3>

  <!-- ✅ RESPONSIVE GRID -->
  <div id="users" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3"></div>

</div>

<script>

// check admin
if(!localStorage.getItem("admin")){
  window.location.href = "login.html";
}


// LOAD USERS
async function loadUsers(){

  let res = await fetch("http://localhost:3000/users");
  let users = await res.json();

  let html = "";

  users.forEach(u => {

    html += `
    <div class="col">
      <div class="card p-3">

        <h5>${u.username}</h5>
        <p>${u.department || "No Dept"}</p>
        <small>${u.contact || "No Contact"}</small>

        ${u.role === "admin" ? 
          `<span class="badge bg-warning mt-2">Admin</span>` 
          : ""}

        ${u.role !== "admin" ? `
          <button class="btn btn-danger mt-2"
            onclick="deleteUser('${u._id}')">
            Delete User
          </button>
        ` : `
          <span class="badge bg-warning mt-2">Admin</span>
        `}

      </div>
    </div>
    `;
  });

  document.getElementById("users").innerHTML = html;
}

loadUsers();


// DELETE USER
async function deleteUser(id){

  let res = await fetch("http://localhost:3000/users");
  let users = await res.json();

  let user = users.find(u => u._id === id);

  if(user.role === "admin"){
    alert("Cannot delete admin ❌");
    return;
  }

  if(!confirm("Delete this user?")) return;

  await fetch("http://localhost:3000/delete-user", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ id })
  });

  alert("User deleted ✅");
  loadUsers();
}


// LOGOUT
function logout(){
  localStorage.removeItem("admin");
  window.location.href = "login.html";
}

</script>

</body>
</html>
