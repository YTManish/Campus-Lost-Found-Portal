<!DOCTYPE html>
<html>
<head>
  <title>Manage Users</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body{
      background:#f5f5f5;
      font-family:Arial, Helvetica, sans-serif;
    }

    /* NAVBAR */

    .navbar{
      background:black;
      padding:15px 0;
    }

    .navbar-brand{
      color:white !important;
      font-size:28px;
      font-weight:bold;
    }

    /* HERO */

    .hero{
      background:linear-gradient(to right,#000,#1f1f1f);
      color:white;
      padding:50px 20px;
      border-radius:0 0 20px 20px;
      margin-bottom:30px;
      text-align:center;
    }

    .hero h1{
      font-size:42px;
      font-weight:900;
    }

    .hero p{
      color:#ccc;
    }

    /* CARD */

    .user-card{
      background:white;
      border-radius:18px;
      padding:20px;
      transition:0.3s;
      height:100%;
      border:1px solid #eee;
    }

    .user-card:hover{
      transform:translateY(-8px);
      box-shadow:0 10px 25px rgba(0,0,0,0.12);
    }

    /* USER LOGO */

    .user-logo{
      width:70px;
      height:70px;
      border-radius:50%;
      background:black;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:bold;
      margin:auto;
      margin-bottom:15px;
    }

    .username{
      font-size:22px;
      font-weight:800;
      text-align:center;
      margin-bottom:5px;
    }

    .dept{
      color:#666;
      text-align:center;
      margin-bottom:8px;
    }

    .contact{
      text-align:center;
      font-size:14px;
      margin-bottom:15px;
    }

    .admin-badge{
      background:#ffd400;
      color:black;
      padding:8px 15px;
      border-radius:20px;
      display:block;
      text-align:center;
      font-weight:bold;
      margin-top:10px;
    }

    .delete-btn{
      width:100%;
      border-radius:10px;
      margin-top:10px;
    }

    /* MOBILE */

    @media(max-width:768px){

      .hero h1{
        font-size:30px;
      }

    }

  </style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark px-3">

  <div class="container-fluid">

    <span class="navbar-brand">
      Campus Lost & Found
    </span>

    <div class="d-flex gap-2 flex-wrap">

      <button class="btn btn-primary"
        onclick="window.location.href='admin.html'">
        Manage Items
      </button>

      <button class="btn btn-danger"
        onclick="logout()">
        Logout
      </button>

    </div>

  </div>

</nav>

<!-- HERO -->

<div class="hero">

  <h1>Manage Users</h1>

  <p>
    View and manage all registered users
  </p>

</div>

<!-- USERS -->

<div class="container">

  <div id="users"
    class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
  </div>

</div>

<script>

// CHECK ADMIN

if(!localStorage.getItem("admin")){
  window.location.href = "login.html";
}


// LOAD USERS

async function loadUsers(){

  let res = await fetch("http://localhost:3000/users");

  let users = await res.json();

  let html = "";

  users.forEach(u => {

    let firstLetter =
      (u.username || "U")
      .charAt(0)
      .toUpperCase();

    html += `

    <div class="col">

      <div class="user-card">

        <div class="user-logo">
          ${firstLetter}
        </div>

        <div class="username">
          ${u.username}
        </div>

        <div class="dept">
          ${u.department || "No Department"}
        </div>

        <div class="contact">
          📞 ${u.contact || "No Contact"}
        </div>

        ${u.role === "admin" ? `

          <span class="admin-badge">
            👑 Admin
          </span>

        ` : `

          <button class="btn btn-danger delete-btn"
            onclick="deleteUser('${u._id}')">

            Delete User

          </button>

        `}

      </div>

    </div>

    `;
  });

  document.getElementById("users").innerHTML = html;
}

loadUsers();


// DELETE USER

async function deleteUser(id){

  let res = await fetch("http://localhost:3000/users");

  let users = await res.json();

  let user = users.find(u => u._id === id);

  if(user.role === "admin"){
    alert("Cannot delete admin ❌");
    return;
  }

  if(!confirm("Delete this user?")) return;

  await fetch("http://localhost:3000/delete-user", {

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify({ id })

  });

  alert("User deleted ✅");

  loadUsers();
}


// LOGOUT

function logout(){

  localStorage.removeItem("admin");

  window.location.href = "login.html";
}

</script>

</body>
</html>
